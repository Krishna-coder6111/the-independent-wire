name: Daily episode

on:
  schedule:
    - cron: "30 11 * * *"   # 11:30 UTC daily (~6:30-7:30 AM US Eastern)
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: daily-episode
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build today's episode
        run: python -m truenews

      - name: Commit and push the episode
        run: |
          git config user.name "episode-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No changes to publish"
          else
            git commit -m "Episode $(date -u +%F)"
            git push
          fi
